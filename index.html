                             <button onClick={() => { triggerVibration(); onBack(); }} className="w-10 h-10 flex items-center justify-center rounded-full bg-white border border-slate-200 text-slate-600 active:scale-90 transition shadow-sm"><i className="fa-solid fa-arrow-left"></i></button>
                             <div>
                                 <h2 className="font-extrabold text-lg text-slate-800 tracking-wide">{isReadOnly ? '紀錄' : '複查'}: {audit.zoneName}</h2>
                                 <p className="text-[10px] font-black text-slate-500 bg-slate-100 border border-slate-200 inline-block px-2 py-0.5 rounded-md mt-0.5 truncate max-w-[150px] uppercase tracking-wider">{audit.staffName}</p>
                             </div>
                        </div>
                        {!isReadOnly && (
                            <button onClick={handleBatchApprove} className="bg-emerald-50 text-emerald-600 border border-emerald-200 px-4 py-2 rounded-xl text-xs font-bold active:scale-95 transition flex items-center gap-1.5 shadow-sm">
                                <i className="fa-solid fa-check-double"></i> 全部認可
                            </button>
                        )}
                    </div>
                    <div className="p-4 space-y-4 px-5">
                        {!isReadOnly && (
                            <div className="bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200 p-4 rounded-2xl text-sm text-amber-800 flex items-center gap-3 shadow-sm">
                                <i className="fa-solid fa-circle-exclamation text-xl text-amber-500 drop-shadow-sm"></i>
                                <span className="font-bold tracking-wide">點擊「駁回」抓缺失，整單最多扣 10 點。</span>
                            </div>
                        )}
                        
                        {audit.items.map(item => {
                            if (item.isNote) {
                                return (
                                    <div key={item.id} className={`p-5 rounded-3xl border shadow-sm ${item.isManagerNote ? 'bg-gradient-to-r from-blue-50 to-indigo-50 border-blue-200' : 'bg-white/80 backdrop-blur border-slate-200'}`}>
                                        <h4 className={`font-extrabold text-sm mb-2 flex items-center gap-2 tracking-wide ${item.isManagerNote ? 'text-blue-700' : 'text-slate-700'}`}><i className={`fa-solid ${item.isManagerNote ? 'fa-user-tie' : 'fa-comment-dots'}`}></i> {item.title || '人員備註'}</h4>
                                        <p className="text-slate-600 text-sm leading-relaxed">{item.desc}</p>
                                    </div>
                                );
                            }

                            const staffRes = item.staffResult;
                            const currentManagerRes = managerOverrides[item.id] !== undefined ? managerOverrides[item.id] : (item.managerResult || staffRes);
                            const isConflict = staffRes === 'pass' && currentManagerRes === 'fail';
                            const isScoreItem = item.id.startsWith('m_');

                            return (
                                <div key={item.id} className={`border rounded-3xl p-5 transition-all duration-300 ${isConflict ? 'border-red-200 bg-red-50/80 shadow-inner' : 'border-white/60 bg-white/80 backdrop-blur shadow-[0_2px_15px_rgba(0,0,0,0.03)]'}`}>
                                    <div className="flex justify-between items-start mb-4">
                                        <div className="flex-1 pr-3">
                                            <div className="flex items-center gap-2 mb-1">
                                                {item.isCritical && <span className="text-[10px] bg-red-500 text-white px-2 py-0.5 rounded-md font-bold shadow-sm shadow-red-500/30">重點</span>}
                                                <h4 className="font-extrabold text-slate-800 text-[15px]">{item.title}</h4>
                                            </div>
                                            <p className="text-xs text-slate-400 font-medium">{item.desc}</p>
                                        </div>
                                        <div className={`px-3 py-1.5 rounded-xl text-xs font-black tracking-wider uppercase border shadow-sm whitespace-nowrap ${staffRes === 'pass' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : (staffRes === 'info' ? 'bg-blue-50 text-blue-600 border-blue-100' : 'bg-red-50 text-red-600 border-red-100')}`}>
                                            {staffRes === 'pass' ? 'Pass' : (staffRes === 'info' ? 'Info' : 'Fail')}
                                        </div>
                                    </div>
                                    
                                    {!isReadOnly && !isScoreItem ? (
                                        <div className="flex gap-3 mt-2">
                                            <button onClick={() => handleOverride(item.id, 'pass')} className={`flex-1 py-3 rounded-2xl text-sm font-bold border transition-all active:scale-95 ${currentManagerRes === 'pass' ? 'bg-emerald-500 text-white border-emerald-500 shadow-lg shadow-emerald-500/30' : 'bg-white text-slate-400 border-slate-200 hover:bg-slate-50'}`}>認可</button>
                                            <button onClick={() => handleOverride(item.id, 'fail')} className={`flex-1 py-3 rounded-2xl text-sm font-bold border transition-all active:scale-95 ${currentManagerRes === 'fail' ? 'bg-red-500 text-white border-red-500 shadow-lg shadow-red-500/30' : 'bg-white text-slate-400 border-slate-200 hover:bg-slate-50'}`}>駁回</button>
                                        </div>
                                    ) : !isReadOnly && isScoreItem ? (
                                         <div className="flex gap-3 mt-2">
                                            <button onClick={() => handleOverride(item.id, 'pass')} className={`flex-1 py-3 rounded-2xl text-sm font-bold border transition-all active:scale-95 ${currentManagerRes === 'pass' ? 'bg-emerald-500 text-white border-emerald-500 shadow-lg shadow-emerald-500/30' : 'bg-white text-slate-400 border-slate-200 hover:bg-slate-50'}`}>確認無誤</button>
                                            <button onClick={() => handleOverride(item.id, 'fail')} className={`flex-1 py-3 rounded-2xl text-sm font-bold border transition-all active:scale-95 ${currentManagerRes === 'fail' ? 'bg-red-500 text-white border-red-500 shadow-lg shadow-red-500/30' : 'bg-white text-slate-400 border-slate-200 hover:bg-slate-50'}`}>數據不實</button>
                                        </div>
                                    ) : (
                                        <div className="mt-4 pt-3 border-t border-slate-200/60 text-xs flex justify-between items-center">
                                            <span className="text-slate-400 font-bold uppercase tracking-widest">檢核結果</span>
                                            <span className={`font-black flex items-center gap-1.5 text-sm ${currentManagerRes === 'pass' ? 'text-emerald-500' : 'text-red-500'}`}>
                                                {currentManagerRes === 'pass' ? <><i className="fa-solid fa-circle-check"></i> 認可</> : <><i className="fa-solid fa-circle-xmark"></i> 駁回</>}
                                            </span>
                                        </div>
                                    )}

                                    {isConflict && <p className="text-xs text-red-500 mt-3 font-bold text-right flex justify-end items-center gap-1.5"><i className="fa-solid fa-triangle-exclamation animate-pulse"></i> 記缺失 (總扣上限 10 點)</p>}
                                </div>
                            );
                        })}

                        {!isReadOnly && (
                            <div className="mt-8 pt-4 border-t border-slate-200">
                                <label className="block text-sm font-extrabold text-slate-700 mb-3 tracking-wide">
                                    <i className="fa-solid fa-pen-nib text-indigo-500 mr-2 text-lg"></i>檢核筆記 / 分析備註
                                </label>
                                <textarea value={managerNote} onChange={(e) => setManagerNote(e.target.value)} placeholder="填寫針對此分區的觀察或建議 (僅供紀錄)" className="w-full p-4 border border-white shadow-[0_2px_15px_rgba(0,0,0,0.03)] rounded-3xl text-sm focus:ring-2 focus:ring-indigo-400 outline-none h-28 resize-none bg-white/80 backdrop-blur"></textarea>
                            </div>
                        )}
                    </div>
                    {!isReadOnly && (
                        <div className="fixed bottom-0 left-0 right-0 p-4 bg-white/70 backdrop-blur-xl border-t border-white/50 max-w-md mx-auto z-50 pb-safe shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
                            <div className="flex justify-between items-center mb-3 px-2">
                                <span className="font-bold text-slate-500 text-sm tracking-wide">預計扣分</span>
                                <span className={`text-2xl font-black tracking-tighter ${currentPenalty > 0 ? 'text-red-500 drop-shadow-sm' : 'text-slate-800'}`}>-{currentPenalty} <span className="text-sm">Pts</span></span>
                            </div>
                            <button onClick={submitReview} className="w-full bg-slate-800 text-white py-4 rounded-3xl font-extrabold text-lg shadow-xl shadow-slate-900/30 active:scale-95 transition-transform">提交複查結果</button>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [usersData, setUsersData] = useState({});
            const [currentUser, setCurrentUser] = useState(null); 
            const [view, setView] = useState('login'); 
            const [selectedZone, setSelectedZone] = useState(null);
            const [selectedAudit, setSelectedAudit] = useState(null);
            const [audits, setAudits] = useState([]);
            const [showRedeemPanel, setShowRedeemPanel] = useState(false);
            const [showSuccessModal, setShowSuccessModal] = useState(false);
            const [showConfirmModal, setShowConfirmModal] = useState(false);
            const [confirmAction, setConfirmAction] = useState(null);
            const [modalMsg, setModalMsg] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isInitialDataLoading, setIsInitialDataLoading] = useState(false);
            const [loadingMsg, setLoadingMsg] = useState('');
            const [apiUrl, setApiUrl] = useState('');

            useEffect(() => {
                const savedUrl = localStorage.getItem('samsung_audit_api_url');
                if (savedUrl) setApiUrl(savedUrl);
                else if (typeof DEFAULT_API_URL !== 'undefined') setApiUrl(DEFAULT_API_URL);
            }, []);

            const refreshData = async () => {
                if (!apiUrl) return;
                setIsInitialDataLoading(true);
                try {
                    const userRes = await callApi(apiUrl, 'getAllUsers');
                    if (userRes.users) setUsersData(userRes.users);
                    if (currentUser) {
                         const updatedUser = userRes.users[currentUser.name];
                         if (updatedUser) setCurrentUser(prev => ({ ...prev, points: updatedUser.points }));
                    }
                    if (currentUser && currentUser.role === 'manager') {
                        const auditRes = await callApi(apiUrl, 'getAudits');
                        if (auditRes.audits) setAudits(auditRes.audits);
                    }
                } catch (e) { console.error("Refresh failed"); }
                setIsInitialDataLoading(false);
            };

            const handleLogin = async (name, role) => {
                setLoadingMsg(role === 'manager' ? '正在驗證身分...' : '正在登入系統...');
                setIsLoading(true);
                try {
                    const res = await callApi(apiUrl, 'login', { name, role });
                    setCurrentUser(res);
                    setView('dashboard');
                    setIsLoading(false);
                    
                    setIsInitialDataLoading(true);
                    fetchInitialData(res); 
                } catch (e) {
                    alert("登入失敗，請檢查網路或系統異常");
                    setIsLoading(false);
                }
            };

            const fetchInitialData = async (user) => {
                try {
                    const userRes = await callApi(apiUrl, 'getAllUsers');
                    if (userRes.users) {
                        setUsersData(userRes.users);
                        if (user && userRes.users[user.name]) {
                            setCurrentUser(prev => ({ ...prev, points: userRes.users[user.name].points }));
                        }
                    }
                    if (user && user.role === 'manager') {
                        const auditRes = await callApi(apiUrl, 'getAudits');
                        if (auditRes.audits) setAudits(auditRes.audits);
                    }
                } catch (e) { console.error("Background fetch failed"); }
                setIsInitialDataLoading(false);
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setView('login');
                setSelectedZone(null);
                setSelectedAudit(null);
                setAudits([]);
            };

            const handleDeleteAudit = (audit) => {
                setConfirmAction({
                    title: "確認刪除",
                    message: "您確定要刪除這筆紀錄嗎？此動作無法復原。",
                    action: async () => {
                        setShowConfirmModal(false);
                        setLoadingMsg('正在刪除紀錄...');
                        setIsLoading(true);
                        setAudits(prev => prev.filter(a => a.id !== audit.id));
                        try {
                            const res = await callApi(apiUrl, 'deleteAudit', { auditId: audit.id });
                            if (res.success) {
                                setModalMsg('紀錄已刪除');
                                setShowSuccessModal(true);
                                setTimeout(() => setShowSuccessModal(false), 1000);
                            } else { alert("刪除失敗"); }
                        } catch(e) { alert("刪除失敗"); }
                        setIsLoading(false);
                    }
                });
                setShowConfirmModal(true);
            };

            const handleAuditSubmit = async (auditData) => {
                setLoadingMsg('正在上傳資料...');
                setIsLoading(true);
                try {
                    const res = await callApi(apiUrl, 'submitAudit', { audit: auditData });
                    if (res.success) {
                        playSuccessSound(); 
                        setModalMsg('+10 點數已入帳！\n待檢核人員複查。');
                        setShowSuccessModal(true);
                        refreshData();
                        setTimeout(() => {
                            setShowSuccessModal(false);
                            setView('dashboard');
                            setSelectedZone(null);
                        }, 1500); 
                    }
                } catch (e) { alert("提交失敗"); }
                setIsLoading(false);
            };

            const handleReviewSubmit = async (reviewedAudit) => {
                setLoadingMsg('正在同步複查結果...');
                setIsLoading(true);
                setAudits(prev => prev.map(a => a.id === reviewedAudit.id ? { ...reviewedAudit, status: 'reviewed' } : a));
                try {
                    const res = await callApi(apiUrl, 'submitReview', { audit: reviewedAudit });
                    if (res.success) {
                        if(reviewedAudit.penalty === 0) playSuccessSound(); 
                        setModalMsg(reviewedAudit.penalty > 0 ? `已扣除 ${reviewedAudit.penalty} 點。` : '複查完成。');
                        setShowSuccessModal(true);
                        setTimeout(() => {
                            setShowSuccessModal(false);
                            setView('dashboard');
                            setSelectedAudit(null);
                        }, 1200); 
                    }
                } catch (e) { alert("複查提交失敗"); }
                setIsLoading(false);
            };

            const handleRedeem = async (userName, amount) => {
                setLoadingMsg('正在處理點數兌換...');
                setIsLoading(true);
                try {
                    const res = await callApi(apiUrl, 'redeem', { name: userName, amount });
                    if (res.success) {
                        playSuccessSound(); 
                        setModalMsg(`兌換成功！\n扣除 ${amount} 點。`);
                        setShowRedeemPanel(false);
                        setShowSuccessModal(true);
                        refreshData();
                        setTimeout(() => setShowSuccessModal(false), 2000);
                    }
                } catch(e) { alert("兌換失敗"); }
                setIsLoading(false);
            };

            return (
                <div className="min-h-screen pb-10 font-sans relative overflow-hidden text-slate-800">
                    <AmbientBackground />
                    {isLoading && <LoadingOverlay message={loadingMsg} />}
                    <ConfirmModal isOpen={showConfirmModal} title={confirmAction?.title} message={confirmAction?.message} onConfirm={confirmAction?.action} onCancel={() => setShowConfirmModal(false)} />
                    {view === 'login' ? (
                        <LoginScreen onLogin={handleLogin} apiUrl={apiUrl} setApiUrl={setApiUrl} />
                    ) : (
                        <div className="relative z-10">
                            <Header currentUser={currentUser} onLogout={handleLogout} onRefresh={refreshData} />
                            
                            {currentUser.role === 'staff' && view === 'dashboard' && <StaffDashboard currentUser={currentUser} onSelectZone={(z) => { setSelectedZone(z); setView('audit_form'); }} onSelectMystery={() => setView('mystery_form')} onShowLeaderboard={() => setView('staff_leaderboard')} />}
                            {currentUser.role === 'staff' && view === 'staff_leaderboard' && <StaffLeaderboardView allUsers={usersData} onBack={() => setView('dashboard')} isInitialLoading={isInitialDataLoading} />}
                            {currentUser.role === 'staff' && view === 'audit_form' && <AuditForm zone={selectedZone} currentUser={currentUser} onBack={() => setView('dashboard')} onSubmit={handleAuditSubmit} />}
                            {currentUser.role === 'staff' && view === 'mystery_form' && <MysteryForm currentUser={currentUser} onBack={() => setView('dashboard')} onSubmit={handleAuditSubmit} />}
                            
                            {currentUser.role === 'manager' && view === 'dashboard' && <ManagerDashboard audits={audits} allUsers={usersData} onReview={(a) => { setSelectedAudit(a); setView('review_form'); }} onOpenRedeem={() => setShowRedeemPanel(true)} onDelete={handleDeleteAudit} isInitialLoading={isInitialDataLoading} />}
                            {currentUser.role === 'manager' && view === 'review_form' && <ReviewForm audit={selectedAudit} onBack={() => setView('dashboard')} onSubmitReview={handleReviewSubmit} />}

                            {showRedeemPanel && <RedemptionPanel allUsers={usersData} onRedeem={handleRedeem} onClose={() => setShowRedeemPanel(false)} />}
                            {showSuccessModal && (
                                <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[100] animate-fade-in backdrop-blur-sm">
                                    <div className="bg-white/95 backdrop-blur-xl border border-white/50 p-8 rounded-[2rem] shadow-2xl text-center max-w-[280px] scale-in">
                                        <div className="w-16 h-16 bg-gradient-to-tr from-emerald-400 to-teal-500 rounded-full flex items-center justify-center mx-auto mb-5 shadow-lg shadow-emerald-500/30 border border-white/50"><i className="fa-solid fa-check text-3xl text-white drop-shadow-sm"></i></div>
                                        <h3 className="text-xl font-extrabold text-slate-800 mb-2">處理完成</h3>
                                        <p className="text-slate-500 text-sm whitespace-pre-line leading-relaxed font-medium">{modalMsg}</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
