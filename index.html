<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">
    <meta name="format-detection" content="telephone=no">

    <!-- 更新分頁標題 -->
    <title>微風南山稽核系統</title>
    
    <!-- 解決 favicon 404 報錯問題 -->
    <link rel="icon" href="data:,">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            overscroll-behavior-y: none;
        }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .mb-safe { margin-bottom: env(safe-area-inset-bottom); }
        .samsung-blue { color: #1428a0; }
        .bg-samsung-blue { background-color: #1428a0; }
        .scale-in { animation: scaleIn 0.2s ease-out; }
        .pulse-logo { animation: pulseLogo 1.5s infinite ease-in-out; }
        
        @keyframes pulseLogo { 
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .dots::after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .progress-bar { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        html { scroll-behavior: smooth; }
        
        .skeleton {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: skeletonLoading 1.5s infinite;
        }
        @keyframes skeletonLoading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Config Data ---
        // 更新為最新的部署 ID
        const YOUR_DEPLOY_ID = "AKfycbxb8ARAaBTyAizgUIww6lJuo-afRqQK1vbXlXRUKGZSTUkFfvi0zzv41Dg_QbaMNS9F";
        const DEFAULT_API_URL = `https://script.google.com/macros/s/${YOUR_DEPLOY_ID}/exec`;
        const MANAGER_PASSWORD = "5444";

        const STORE_MAP_URL = "https://raw.githubusercontent.com/andyhhsu/breeze-audit-/main/20260315_172104.jpg"; 

        const ZONES = [
            { id: 'A', name: 'A 區', icon: 'fa-a' },
            { id: 'B', name: 'B 區', icon: 'fa-b' },
            { id: 'C', name: 'C 區', icon: 'fa-c' },
            { id: 'D', name: 'D 區', icon: 'fa-d' },
            { id: 'E', name: 'E 區', icon: 'fa-e' },
            { id: 'F', name: 'F 區', icon: 'fa-f' },
            { id: 'G', name: 'G 區', icon: 'fa-g' },
        ];

        const CHECK_ITEMS_TEMPLATE = [
            { id: 'i1', title: '展機清潔', desc: '(指紋、保護貼、汙垢)', category: '清潔', isCritical: false },
            { id: 'i2', title: '展座清潔、毀損確認', desc: '確認展座底部黑色區域無灰塵且無毀損', category: '清潔', isCritical: false },
            { id: 'i3', title: '桌面清潔', desc: '桌面無灰塵雜物', category: '清潔', isCritical: false },
            { id: 'i18', title: '櫃體清潔', desc: '櫃體表面與內部無灰塵雜物', category: '清潔', isCritical: false },
            { id: 'i4', title: '展座防盜是否正常', desc: '(蝸牛貼合、充電) *重點', category: '規範', isCritical: true, requirePhoto: false },
            { id: 'i19', title: '防盜背貼是否需更換', desc: '確認背貼黏性與狀態', category: '規範', isCritical: false },
            { id: 'i5', title: '手錶正反面', desc: '確認手錶擺放方向正確', category: '規範', isCritical: false },
            { id: 'i6', title: '配件間距小於 5cm', desc: '商品掛勾間距需符合規範', category: '規範', isCritical: true },
            { id: 'i7', title: '價格牌是否合規範', desc: '位置與內容正確', category: '規範', isCritical: false },
            { id: 'i8', title: '價格牌跳行規範', desc: '第二行文字須完整顯示', category: '規範', isCritical: false },
            { id: 'i9', title: '展示機跑 Retail Mode', desc: '確認執行零售模式', category: '軟體', isCritical: true },
            { id: 'i10', title: '展示機顯示 R 字樣', desc: '螢幕上方確認顯示 R', category: '軟體', isCritical: true, requirePhoto: false },
            { id: 'i11', title: '電子看板 INFO 連網', desc: '確認 INFO 資訊看板已連線', category: '軟體', isCritical: true },
            { id: 'i12', title: '展機資料檢查', desc: '(照片、雲端、郵件、試算表)', category: '系統', isCritical: false },
            { id: 'i13', title: '軟體更新', desc: '檢查系統更新', category: '系統', isCritical: false },
            { id: 'i14', title: 'Wearable/ST 更新', desc: '只更新 Wearable 與 SmartThing', category: '系統', isCritical: false },
            { id: 'i15', title: '是否配對', desc: '穿戴裝置配對狀態', category: '系統', isCritical: false },
            { id: 'i16', title: 'Google/三星 帳號', desc: '皆已登錄', category: '系統', isCritical: false },
            { id: 'i17', title: '電量問題', desc: '確認充電正常', category: '系統', isCritical: false },
            { id: 'i20', title: 'Spen連線', desc: '(如果有)', category: '系統', isCritical: false },
        ];

        // --- Helper Functions ---
        
        const playSuccessSound = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, ctx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(783.99, ctx.currentTime + 0.1); 
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.4);
            } catch(e) { console.log("Audio not supported"); }
        };

        const triggerVibration = (pattern = 50) => {
            try { if (navigator.vibrate) navigator.vibrate(pattern); } 
            catch(e) {}
        };

        const getDynamicGreeting = () => {
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            const today = new Date().getDay();
            const dayStr = `星期${days[today]}`;
            
            const quotes = [
                "準備好今天的挑戰了嗎？🚀",
                "保持完美展機，從細節開始！✨",
                "喝口水，讓我們快速完成今天的確認。💪",
                "用最高標準，迎接每一位顧客。🌟",
                "細節決定成敗，今天也辛苦了！🔍",
                "點數等著你，快速通關今天的稽核吧！🎯"
            ];
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            return `${dayStr}下午好！\n${randomQuote}`;
        };

        const parseAndFormatDate = (input) => {
            if (!input) return '--/-- --:--';
            let dateObj;
            const d = new Date(input);
            if (!isNaN(d.getTime())) { dateObj = d; } else {
                if (typeof input === 'string' && input.includes('/')) {
                    const parts = input.split(' ');
                    const dateParts = parts[0].split('/');
                    const timeParts = parts[1] ? parts[1].split(':') : ['00', '00'];
                    if (dateParts.length === 3) {
                        dateObj = new Date(parseInt(dateParts[0]), parseInt(dateParts[1]) - 1, parseInt(dateParts[2]), parseInt(timeParts[0]), parseInt(timeParts[1]));
                    }
                }
            }
            if (dateObj && !isNaN(dateObj.getTime())) {
                const m = String(dateObj.getMonth() + 1).padStart(2, '0');
                const d = String(dateObj.getDate()).padStart(2, '0');
                const h = String(dateObj.getHours()).padStart(2, '0');
                const min = String(dateObj.getMinutes()).padStart(2, '0');
                return `${m}/${d} ${h}:${min}`;
            }
            return String(input);
        };

        const getNowString = () => {
            const date = new Date();
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            const h = String(date.getHours()).padStart(2, '0');
            const min = String(date.getMinutes()).padStart(2, '0');
            return `${y}/${m}/${d} ${h}:${min}`;
        };

        // 優化 API 呼叫，加入 redirect 參數處理 CORS
        const callApi = async (url, action, data = {}) => {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    redirect: 'follow', // 確保跟隨 Google 的重定向
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action, ...data })
                });
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                console.error("API Error:", error);
                throw error;
            }
        };

        // --- Components ---

        const AmbientBackground = () => (
            <div className="fixed inset-0 z-[0] overflow-hidden pointer-events-none">
                <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-400/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob"></div>
                <div className="absolute top-[20%] right-[-10%] w-96 h-96 bg-indigo-400/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-2000"></div>
                <div className="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-purple-400/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-4000"></div>
            </div>
        );

        const SkeletonList = () => (
            <div className="space-y-4 p-4 relative z-10">
                {[1, 2, 3].map(i => (
                    <div key={i} className="bg-white/80 backdrop-blur-sm rounded-2xl p-5 border border-white/60 shadow-sm flex items-center justify-between">
                        <div className="flex items-center gap-3 w-full">
                            <div className="w-10 h-10 rounded-full skeleton flex-shrink-0"></div>
                            <div className="space-y-2 w-full">
                                <div className="h-4 skeleton rounded-md w-1/3"></div>
                                <div className="h-3 skeleton rounded-md w-1/4"></div>
                            </div>
                        </div>
                    </div>
                ))}
            </div>
        );

        const LoadingOverlay = ({ message }) => (
            <div className="fixed inset-0 bg-slate-900/40 z-[100] flex items-center justify-center backdrop-blur-md animate-fade-in">
                <div className="bg-white/90 backdrop-blur-xl p-8 rounded-3xl shadow-2xl border border-white/50 flex flex-col items-center max-w-[280px] w-full transform transition-all scale-in">
                    <div className="w-16 h-16 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-full flex items-center justify-center mb-6 shadow-lg shadow-blue-500/30 pulse-logo relative">
                        <i className="fa-solid fa-cloud text-white text-2xl"></i>
                        <div className="absolute inset-0 border-4 border-blue-300 rounded-full opacity-30 animate-ping"></div>
                    </div>
                    <h3 className="font-bold text-slate-800 text-lg mb-2">處理中<span className="dots"></span></h3>
                    <p className="text-slate-500 text-xs text-center leading-relaxed font-medium">
                        {message || '正在同步資料...'}
                    </p>
                </div>
            </div>
        );

        const ConfirmModal = ({ isOpen, title, message, onConfirm, onCancel }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-900/50 z-[110] flex items-center justify-center backdrop-blur-sm animate-fade-in px-4">
                    <div className="bg-white/95 backdrop-blur-xl border border-white/50 rounded-3xl shadow-2xl max-w-sm w-full p-6 scale-in">
                        <h3 className="text-lg font-bold text-slate-800 mb-2">{title}</h3>
                        <p className="text-slate-600 text-sm mb-6 leading-relaxed">{message}</p>
                        <div className="flex gap-3">
                            <button onClick={onCancel} className="flex-1 py-3 rounded-2xl border border-slate-200 text-slate-600 font-bold active:bg-slate-50 transition hover:bg-slate-50">取消</button>
                            <button onClick={() => { triggerVibration(); onConfirm(); }} className="flex-1 py-3 rounded-2xl bg-gradient-to-r from-red-500 to-rose-600 text-white font-bold shadow-lg shadow-red-500/30 active:scale-95 transition">確認</button>
                        </div>
                    </div>
                </div>
            );
        };

        const LoginScreen = ({ onLogin, apiUrl, setApiUrl }) => {
            const [name, setName] = useState('');
            const [role, setRole] = useState('staff');
            const [password, setPassword] = useState('');
            const [localUrl, setLocalUrl] = useState(apiUrl || DEFAULT_API_URL);
            const [showGuide, setShowGuide] = useState(false);

            useEffect(() => {
                const savedName = localStorage.getItem('samsung_audit_username');
                const savedRole = localStorage.getItem('samsung_audit_userrole');
                if (savedName) setName(savedName);
                if (savedRole) setRole(savedRole);
            }, []);

            useEffect(() => {
                if (!apiUrl && DEFAULT_API_URL) {
                     setApiUrl(DEFAULT_API_URL);
                     localStorage.setItem('samsung_audit_api_url', DEFAULT_API_URL);
                }
            }, []);

            const handleSubmit = (e) => {
                e.preventDefault();
                let cleanName = name.trim();
                if (role === 'manager') {
                    if (password !== MANAGER_PASSWORD) { triggerVibration([100, 50, 100]); alert("檢核人員密碼錯誤！"); return; }
                    cleanName = "檢核人員";
                } else {
                    if (!cleanName) return;
                }

                localStorage.setItem('samsung_audit_username', cleanName);
                localStorage.setItem('samsung_audit_userrole', role);
                if (!apiUrl) setApiUrl(localUrl);
                
                triggerVibration();
                playSuccessSound();
                onLogin(cleanName, role);
            };

            return (
                <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-4 relative overflow-hidden">
                    {/* Dark Mode Blobs for Login */}
                    <div className="absolute top-[-20%] left-[-10%] w-96 h-96 bg-blue-600/30 rounded-full mix-blend-screen filter blur-[100px] animate-blob"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-600/30 rounded-full mix-blend-screen filter blur-[100px] animate-blob animation-delay-2000"></div>

                    <div className="bg-white/10 backdrop-blur-2xl border border-white/20 rounded-3xl p-8 w-full max-w-sm shadow-2xl scale-in relative z-10">
                        <div className="text-center mb-8">
                            <img src="https://raw.githubusercontent.com/andyhhsu/breeze-audit-/main/214518.jpg" alt="Logo" className="w-16 h-16 rounded-full mx-auto mb-4 shadow-lg shadow-blue-500/30 object-cover border-2 border-white/20" />
                            <h1 className="text-2xl font-bold text-white tracking-tight">微風南山稽核系統</h1>
                            <p className="text-blue-200/70 text-sm mt-2 font-medium tracking-wide">Mobile Version 5.0</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-5">
                            <div>
                                <label className="block text-sm font-medium text-slate-300 mb-1.5">您的姓名 {role === 'manager' && "(檢核人員免填)"}</label>
                                <input 
                                    type="text" 
                                    value={name}
                                    onChange={(e) => setName(e.target.value)}
                                    className="w-full p-4 bg-slate-800/50 border border-slate-700/50 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-white shadow-inner transition-all placeholder-slate-500"
                                    placeholder={role === 'manager' ? "系統自動登錄" : "例如：王小明"}
                                    disabled={role === 'manager'}
                                    style={{ userSelect: 'text', WebkitUserSelect: 'text' }}
                                />
                            </div>
                            
                            <div className="grid grid-cols-2 gap-3">
                                <button 
                                    type="button"
                                    onClick={() => { triggerVibration(); setRole('staff'); }}
                                    className={`p-4 rounded-2xl border text-sm font-bold transition-all active:scale-95 ${role === 'staff' ? 'bg-blue-500/20 border-blue-400 text-blue-300 shadow-[inset_0_0_15px_rgba(59,130,246,0.2)]' : 'border-slate-700/50 text-slate-400 hover:bg-slate-800/50'}`}
                                >
                                    <i className="fa-solid fa-user mr-2"></i>我是店員
                                </button>
                                <button 
                                    type="button"
                                    onClick={() => { triggerVibration(); setRole('manager'); }}
                                    className={`p-4 rounded-2xl border text-sm font-bold transition-all active:scale-95 ${role === 'manager' ? 'bg-indigo-500/20 border-indigo-400 text-indigo-300 shadow-[inset_0_0_15px_rgba(99,102,241,0.2)]' : 'border-slate-700/50 text-slate-400 hover:bg-slate-800/50'}`}
                                >
                                    <i className="fa-solid fa-user-tie mr-2"></i>檢核人員
                                </button>
                            </div>

                            {role === 'manager' && (
                                <div className="animate-fade-in">
                                    <label className="block text-sm font-medium text-slate-300 mb-1.5">檢核人員密碼</label>
                                    <input 
                                        type="password" 
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        className="w-full p-4 bg-slate-800/50 border border-slate-700/50 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none text-white shadow-inner placeholder-slate-500"
                                        placeholder="請輸入密碼"
                                        style={{ userSelect: 'text', WebkitUserSelect: 'text' }}
                                    />
                                </div>
                            )}

                            <button type="submit" className="w-full text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-500/40 transition-all transform active:scale-95 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-lg">
                                登入系統
                            </button>

                            <div className="flex justify-center mt-4">
                                <button type="button" onClick={() => { triggerVibration(); setShowGuide(true); }} className="text-slate-400 hover:text-blue-300 transition-colors flex items-center gap-2 text-sm bg-slate-800/50 px-4 py-2 rounded-full border border-slate-700/50">
                                    <i className="fa-regular fa-circle-question text-lg"></i>
                                    <span>快速上手指南</span>
                                </button>
                            </div>
                        </form>
                    </div>

                    {showGuide && (
                        <div className="fixed inset-0 bg-slate-900/90 z-[120] flex items-center justify-center p-4 animate-fade-in backdrop-blur-sm" onClick={() => setShowGuide(false)}>
                            <div className="relative w-full max-w-lg max-h-[90vh] overflow-auto rounded-2xl">
                                <img src="https://raw.githubusercontent.com/andyhhsu/breeze-audit-/main/%E4%B8%89%E6%98%9F%E5%BE%AE%E9%A2%A8%E5%8D%97%E5%B1%B1-%E6%95%B8%E4%BD%8D%E7%A8%BD%E6%A0%B8%E5%BF%AB%E9%80%9F%E6%8C%87%E5%8D%97.jpg" className="w-full h-auto shadow-2xl scale-in rounded-2xl" onClick={(e) => e.stopPropagation()} alt="使用指南"/>
                                <button className="absolute top-4 right-4 text-slate-800 w-10 h-10 flex items-center justify-center bg-white/90 backdrop-blur rounded-full shadow-lg active:scale-90" onClick={() => setShowGuide(false)}>
                                    <i className="fa-solid fa-xmark text-lg"></i>
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const Header = ({ currentUser, onLogout, onRefresh }) => (
            <div className="bg-slate-900/80 backdrop-blur-xl border-b border-slate-800 text-white px-4 py-3 sticky top-0 z-50">
                <div className="flex justify-between items-center max-w-md mx-auto">
                    <div className="flex items-center gap-3">
                        <div className="bg-gradient-to-tr from-blue-500 to-indigo-500 w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm shadow-inner shadow-white/20 border border-white/10">
                            {currentUser.name[0]}
                        </div>
                        <div className="flex flex-col">
                            <span className="font-bold text-sm tracking-wide leading-tight">{currentUser.name}</span>
                            <span className="text-[10px] text-blue-300 uppercase font-bold tracking-wider">{currentUser.role === 'staff' ? 'Staff' : 'Inspector'}</span>
                        </div>
                    </div>
                    <div className="flex items-center gap-4">
                        <button onClick={() => { triggerVibration(); onRefresh(); }} className="w-8 h-8 flex items-center justify-center rounded-full active:bg-slate-800 transition">
                             <i className="fa-solid fa-rotate-right text-slate-400"></i>
                        </button>
                        {currentUser.role === 'staff' && (
                            <div className="flex items-center gap-1.5 bg-slate-800/80 pl-3 pr-4 py-1.5 rounded-full text-sm border border-slate-700 shadow-inner">
                                <i className="fa-solid fa-star text-amber-400 text-xs drop-shadow-[0_0_5px_rgba(251,191,36,0.5)]"></i>
                                <span className="font-bold font-mono text-amber-50">{currentUser.points}</span>
                            </div>
                        )}
                        <button onClick={() => { triggerVibration(); onLogout(); }} className="w-8 h-8 flex items-center justify-center rounded-full active:bg-slate-800 transition">
                            <i className="fa-solid fa-right-from-bracket text-slate-400"></i>
                        </button>
                    </div>
                </div>
            </div>
        );

        const LeaderboardList = ({ allUsers }) => {
             const leaderboardData = useMemo(() => {
                return Object.entries(allUsers)
                    .filter(([_, data]) => data.role === 'staff')
                    .sort((a, b) => {
                        const scoreA = a[1].lifetimePoints !== undefined ? a[1].lifetimePoints : a[1].points;
                        const scoreB = b[1].lifetimePoints !== undefined ? b[1].lifetimePoints : b[1].points;
                        return scoreB - scoreA;
                    })
                    .map(([name, data], index) => ({ 
                        rank: index + 1, 
                        name, 
                        points: data.points, 
                        lifetimePoints: data.lifetimePoints !== undefined ? data.lifetimePoints : data.points 
                    }));
            }, [allUsers]);

            const renderRankIcon = (rank) => {
                if (rank === 1) return <i className="fa-solid fa-trophy text-amber-400 text-2xl drop-shadow-md"></i>;
                if (rank === 2) return <i className="fa-solid fa-medal text-slate-300 text-2xl drop-shadow-md"></i>;
                if (rank === 3) return <i className="fa-solid fa-medal text-amber-700 text-2xl drop-shadow-md"></i>;
                return <span className="font-extrabold text-slate-300 text-lg w-6 text-center">{rank}</span>;
            };

            return (
                <div className="space-y-3 relative z-10">
                    <div className="text-xs text-center text-slate-500 mb-3 bg-white/50 backdrop-blur rounded-full py-1.5 px-3 mx-auto w-fit border border-white/60 shadow-sm">
                        <i className="fa-solid fa-circle-info mr-1.5 text-blue-500"></i> 
                        排名依據：榮譽積分 (不受兌換影響)
                    </div>
                    {leaderboardData.length === 0 ? (
                        <div className="text-center py-16 text-slate-400"><p>目前無人員資料</p></div>
                    ) : (
                        leaderboardData.map((user) => (
                            <div key={user.name} className="bg-white/80 backdrop-blur-md rounded-3xl p-4 shadow-[0_2px_10px_rgba(0,0,0,0.02)] border border-white/60 flex items-center justify-between transition-all hover:shadow-md">
                                <div className="flex items-center gap-4">
                                    <div className="w-8 flex justify-center">{renderRankIcon(user.rank)}</div>
                                    <div className="flex flex-col">
                                        <span className="font-bold text-slate-800 text-lg">{user.name}</span>
                                        <span className="text-xs text-slate-400 font-medium tracking-wide">Staff</span>
                                    </div>
                                </div>
                                <div className="flex flex-col items-end gap-1">
                                    <div className="font-bold font-mono text-blue-600 bg-blue-50/80 px-3 py-1 rounded-xl text-sm border border-blue-100">
                                        {user.points} <span className="text-[10px] text-blue-400 uppercase">Pts</span>
                                    </div>
                                    <span className="text-[10px] text-slate-400 font-bold bg-slate-100/80 px-2 py-0.5 rounded-lg border border-slate-200">榮譽: {user.lifetimePoints}</span>
                                </div>
                            </div>
                        ))
                    )}
                </div>
            );
        };

        const StaffLeaderboardView = ({ allUsers, onBack, isInitialLoading }) => {
            return (
                <div className="pb-36 max-w-md mx-auto scale-in pb-safe relative z-10">
                    <div className="sticky top-[60px] bg-white/70 backdrop-blur-xl z-40 border-b border-white/50 shadow-sm transition-all">
                        <div className="p-4 flex items-center gap-4">
                            <button onClick={() => { triggerVibration(); onBack(); }} className="w-10 h-10 flex items-center justify-center rounded-full bg-white text-slate-600 shadow-sm border border-slate-100 active:scale-90 transition">
                                <i className="fa-solid fa-arrow-left text-lg"></i>
                            </button>
                            <h2 className="font-bold text-lg text-slate-800 tracking-wide">榮譽排行榜</h2>
                        </div>
                    </div>
                    {isInitialLoading ? <SkeletonList /> : (
                        <div className="p-4"><LeaderboardList allUsers={allUsers} /></div>
                    )}
                </div>
            );
        };

        const StaffDashboard = ({ onSelectZone, onSelectMystery, onShowLeaderboard, currentUser }) => {
            const [showMapModal, setShowMapModal] = useState(false);
            const [greetingText, setGreetingText] = useState("");

            useEffect(() => {
                setGreetingText(getDynamicGreeting());
            }, []);

            return (
                <div className="p-4 max-w-md mx-auto scale-in pb-32 relative z-10">
                    
                    <div className="mb-6 px-1">
                        <p className="text-slate-500 text-sm font-bold tracking-wide uppercase mb-1">HELLO, {currentUser?.name}</p>
                        <h2 className="text-xl font-extrabold text-slate-800 whitespace-pre-line leading-snug">{greetingText}</h2>
                    </div>

                    <div className="grid grid-cols-2 gap-3 mb-8">
                        <button onClick={() => { triggerVibration(); onSelectMystery(); }} className="bg-gradient-to-br from-purple-500 to-indigo-600 text-white p-5 rounded-3xl shadow-lg shadow-purple-500/20 flex flex-col justify-between h-36 group active:scale-95 transition-all relative overflow-hidden border border-white/20">
                            <div className="absolute right-0 top-0 w-24 h-24 bg-white/10 rounded-full -mr-8 -mt-8 transition-transform group-hover:scale-110"></div>
                            <div className="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center text-2xl backdrop-blur-md shadow-inner">
                                <i className="fa-solid fa-user-secret drop-shadow"></i>
                            </div>
                            <div className="text-left z-10 mt-auto">
                                <h3 className="font-bold text-lg drop-shadow-sm">神秘客訓練</h3>
                                <p className="text-purple-100 text-[10px] mt-0.5 uppercase tracking-wider font-bold opacity-80">雙人協作</p>
                            </div>
                        </button>

                        <button onClick={() => { triggerVibration(); onShowLeaderboard(); }} className="bg-gradient-to-br from-amber-400 to-orange-500 text-white p-5 rounded-3xl shadow-lg shadow-amber-500/20 flex flex-col justify-between h-36 group active:scale-95 transition-all relative overflow-hidden border border-white/20">
                             <div className="absolute right-0 top-0 w-24 h-24 bg-white/10 rounded-full -mr-8 -mt-8 transition-transform group-hover:scale-110"></div>
                            <div className="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center text-2xl backdrop-blur-md shadow-inner">
                                <i className="fa-solid fa-trophy drop-shadow"></i>
                            </div>
                            <div className="text-left z-10 mt-auto">
                                <h3 className="font-bold text-lg drop-shadow-sm">榮譽排行榜</h3>
                                <p className="text-amber-100 text-[10px] mt-0.5 uppercase tracking-wider font-bold opacity-80">團隊排名</p>
                            </div>
                        </button>
                    </div>

                    <div className="flex items-center justify-between mb-4 ml-1">
                        <h2 className="text-xl font-extrabold text-slate-800">區域稽核 <span className="text-slate-400 text-sm font-medium tracking-wide">Audit</span></h2>
                    </div>
                    
                    <div className="grid grid-cols-2 gap-3">
                        {ZONES.map(zone => (
                            <button key={zone.id} onClick={() => { triggerVibration(); onSelectZone(zone); }} className="bg-white/80 backdrop-blur-md p-5 rounded-3xl shadow-[0_2px_10px_rgba(0,0,0,0.03)] border border-white/60 flex flex-col items-center justify-center gap-3 active:scale-95 active:bg-slate-50 transition-all duration-200 hover:shadow-md">
                                <div className="w-14 h-14 bg-gradient-to-tr from-blue-50 to-indigo-50 rounded-2xl flex items-center justify-center text-blue-600 text-2xl font-black shadow-inner border border-white">
                                    {zone.id}
                                </div>
                                <span className="font-extrabold text-slate-700">{zone.name}</span>
                            </button>
                        ))}
                    </div>

                    <div className="mt-8 mb-4">
                         <div className="bg-white/80 backdrop-blur-md rounded-3xl shadow-[0_2px_10px_rgba(0,0,0,0.03)] border border-white/60 overflow-hidden p-1">
                            <div className="p-3 px-4 flex justify-between items-center">
                                <span className="text-xs font-bold text-slate-500 uppercase tracking-widest">門市分區展圖 (點擊放大)</span>
                                <i className="fa-solid fa-map-location-dot text-slate-400"></i>
                            </div>
                            <div className="relative group cursor-zoom-in rounded-2xl overflow-hidden shadow-inner border border-slate-100" onClick={() => { triggerVibration(); setShowMapModal(true); }}>
                                <img src={STORE_MAP_URL} alt="Store Map" className="w-full h-auto object-cover transform transition-transform duration-500 group-hover:scale-105" onError={(e) => { e.target.onerror = null; e.target.src="https://placehold.co/800x400/f1f5f9/94a3b8?text=Image+Not+Found"; }} />
                                <div className="absolute inset-0 bg-slate-900/0 group-hover:bg-slate-900/10 transition-colors pointer-events-none"></div>
                                <div className="absolute bottom-3 right-3 bg-slate-900/50 backdrop-blur text-white p-2 rounded-xl opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none shadow-lg">
                                    <i className="fa-solid fa-expand text-sm"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    {showMapModal && (
                        <div className="fixed inset-0 bg-slate-900/95 z-[120] flex items-center justify-center p-4 animate-fade-in backdrop-blur-md" onClick={(e) => { e.stopPropagation(); setShowMapModal(false); }}>
                            <img src={STORE_MAP_URL} className="max-w-full max-h-full rounded-2xl shadow-2xl scale-in" onClick={(e) => e.stopPropagation()} />
                            <button className="absolute top-6 right-6 text-slate-800 w-12 h-12 flex items-center justify-center bg-white/90 backdrop-blur rounded-full shadow-xl active:scale-90 transition" onClick={() => { triggerVibration(); setShowMapModal(false); }}>
                                <i className="fa-solid fa-xmark text-xl"></i>
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const AuditForm = ({ zone, currentUser, onBack, onSubmit }) => {
            const [results, setResults] = useState({});
            const [note, setNote] = useState('');
            const [isDraftLoaded, setIsDraftLoaded] = useState(false);
            const itemRefs = useRef([]); 

            useEffect(() => {
                const draftKey = `samsung_audit_draft_${currentUser.name}_${zone.id}`;
                const savedDraft = localStorage.getItem(draftKey);
                if (savedDraft) {
                    try {
                        const parsed = JSON.parse(savedDraft);
                        setResults(parsed.results || {});
                        setNote(parsed.note || '');
                    } catch(e) {}
                }
                setIsDraftLoaded(true);
            }, [currentUser.name, zone.id]);

            useEffect(() => {
                if (!isDraftLoaded) return;
                const draftKey = `samsung_audit_draft_${currentUser.name}_${zone.id}`;
                localStorage.setItem(draftKey, JSON.stringify({ results, note }));
            }, [results, note, isDraftLoaded, currentUser.name, zone.id]);

            const handleToggle = (itemId, status) => {
                triggerVibration(); 
                setResults(prev => ({ ...prev, [itemId]: { ...prev[itemId], status } }));
                
                const currentIndex = CHECK_ITEMS_TEMPLATE.findIndex(i => i.id === itemId);
                if (currentIndex !== -1 && currentIndex < CHECK_ITEMS_TEMPLATE.length - 1) {
                    const nextNode = itemRefs.current[currentIndex + 1];
                    if (nextNode) {
                        setTimeout(() => { nextNode.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 300); 
                    }
                }
            };

            const completedCount = Object.keys(results).filter(k => results[k]?.status).length;
            const totalCount = CHECK_ITEMS_TEMPLATE.length;
            const progressPercent = Math.round((completedCount / totalCount) * 100);
            const isReadyToSubmit = completedCount === totalCount;

            const submitAudit = () => {
                if (!isReadyToSubmit) return;
                triggerVibration([50, 50, 50]);
                const itemsPayload = CHECK_ITEMS_TEMPLATE.map(item => ({
                    ...item,
                    staffResult: results[item.id]?.status || 'fail'
                }));
                if (note.trim()) {
                    itemsPayload.push({
                        id: 'custom_note', title: '狀況回報/備註', desc: note.trim(), category: '備註', staffResult: 'info', isNote: true
                    });
                }
                const auditData = {
                    id: `${Date.now()}_${currentUser.name}`, zoneId: zone.id, zoneName: zone.name, 
                    timestamp: getNowString(), staffName: currentUser.name, items: itemsPayload, status: 'pending',
                    type: 'audit', note: note.trim()
                };
                localStorage.removeItem(`samsung_audit_draft_${currentUser.name}_${zone.id}`);
                onSubmit(auditData);
            };

            return (
                <div className="pb-36 max-w-md mx-auto scale-in pb-safe relative z-10">
                    <div className="sticky top-[60px] bg-white/70 backdrop-blur-xl z-40 border-b border-white/50 shadow-sm transition-all">
                        <div className="p-4 flex items-center gap-4">
                            <button onClick={() => { triggerVibration(); onBack(); }} className="w-10 h-10 flex items-center justify-center rounded-full bg-white text-slate-600 shadow-sm border border-slate-100 active:scale-90 transition">
                                <i className="fa-solid fa-arrow-left text-lg"></i>
                            </button>
                            <div className="flex-1">
                                <div className="flex justify-between items-end mb-1.5">
                                    <h2 className="font-bold text-lg text-slate-800 tracking-wide">{zone.name} 稽核</h2>
                                    <span className="text-[10px] font-bold text-blue-600 bg-blue-100 px-2 py-0.5 rounded-lg border border-blue-200 shadow-inner">{completedCount}/{totalCount}</span>
                                </div>
                                <div className="w-full bg-slate-200/50 rounded-full h-1.5 overflow-hidden shadow-inner">
                                    <div className="bg-gradient-to-r from-blue-500 to-indigo-500 h-1.5 rounded-full progress-bar shadow-[0_0_10px_rgba(59,130,246,0.5)]" style={{ width: `${progressPercent}%` }}></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="p-4 space-y-4">
                        {CHECK_ITEMS_TEMPLATE.map((item, index) => {
                            const itemState = results[item.id] || {};
                            const isCompleted = !!itemState.status;
                            
                            const cardBaseClass = "rounded-3xl p-5 transition-all duration-500 scroll-mt-48 relative overflow-hidden";
                            const cardStyleClass = isCompleted 
                                ? "bg-white/40 backdrop-blur-sm border border-transparent shadow-none opacity-60 scale-[0.98] grayscale-[20%]" 
                                : "bg-white/90 backdrop-blur-lg border border-white shadow-[0_4px_20px_rgba(0,0,0,0.04)] opacity-100 scale-100";

                            return (
                                <div key={item.id} ref={el => itemRefs.current[index] = el} className={`${cardBaseClass} ${cardStyleClass}`}>
                                    {isCompleted && itemState.status === 'pass' && <div className="absolute top-0 right-0 w-16 h-16 bg-green-400/10 rounded-bl-full -z-10"></div>}
                                    {isCompleted && itemState.status === 'fail' && <div className="absolute top-0 right-0 w-16 h-16 bg-red-400/10 rounded-bl-full -z-10"></div>}
                                    
                                    <div className="flex justify-between items-start mb-4">
                                        <div className="pr-2 relative z-10">
                                            <div className="flex items-center gap-2 flex-wrap mb-1">
                                                {item.isCritical && <span className="bg-gradient-to-r from-red-500 to-rose-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-lg shadow-sm shadow-red-500/30 tracking-wider">重點</span>}
                                                <h3 className={`font-extrabold text-[15px] ${isCompleted ? 'text-slate-600' : 'text-slate-800'}`}>{item.title}</h3>
                                            </div>
                                            <p className={`text-xs leading-relaxed ${isCompleted ? 'text-slate-400' : 'text-slate-500'}`}>{item.desc}</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-3 relative z-10">
                                        <button onClick={() => handleToggle(item.id, 'fail')} className={`flex-1 py-3.5 rounded-2xl font-bold text-sm transition-all active:scale-95 flex items-center justify-center gap-2 ${itemState.status === 'fail' ? 'bg-gradient-to-r from-red-50 to-rose-50 text-red-600 border border-red-200 ring-2 ring-red-500 ring-offset-2 shadow-sm' : 'bg-slate-50 text-slate-500 border border-slate-100 hover:bg-slate-100'}`}>
                                            <i className="fa-solid fa-xmark"></i> 異常
                                        </button>
                                        <button onClick={() => handleToggle(item.id, 'pass')} className={`flex-1 py-3.5 rounded-2xl font-bold text-sm transition-all active:scale-95 flex items-center justify-center gap-2 ${itemState.status === 'pass' ? 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-lg shadow-blue-500/40 border border-transparent' : 'bg-slate-50 text-slate-500 border border-slate-100 hover:bg-slate-100'}`}>
                                            <i className="fa-solid fa-check"></i> 正常
                                        </button>
                                    </div>
                                </div>
                            );
                        })}

                        <div className="mt-8 pt-6 border-t border-slate-200/50">
                            <label className="block text-sm font-bold text-slate-700 mb-3 flex items-center gap-2 ml-1">
                                <span className="w-8 h-8 rounded-full bg-blue-100/50 text-blue-600 flex items-center justify-center border border-blue-200"><i className="fa-solid fa-pen-to-square"></i></span>
                                狀況回報 / 備註 (選填)
                            </label>
                            <textarea
                                value={note} onChange={(e) => setNote(e.target.value)}
                                placeholder="例如：展機線材些微破損、價格牌架缺損..."
                                className="w-full p-4 bg-white/80 backdrop-blur border border-white shadow-[0_2px_15px_rgba(0,0,0,0.03)] rounded-3xl text-base focus:ring-2 focus:ring-blue-400 outline-none h-32 resize-none text-slate-700"
                                style={{ userSelect: 'text', WebkitUserSelect: 'text' }}
                            ></textarea>
                            <p className="text-[10px] text-slate-400 mt-2 text-right flex items-center justify-end gap-1 font-bold tracking-wider uppercase"><i className="fa-solid fa-cloud-arrow-up"></i> Auto Saved</p>
                        </div>
                    </div>
                    
                    <div className="fixed bottom-0 left-0 right-0 p-4 bg-white/70 backdrop-blur-xl border-t border-white/50 max-w-md mx-auto z-50 pb-safe shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
                        <button 
                            disabled={!isReadyToSubmit} onClick={submitAudit}
                            className={`w-full py-4 rounded-3xl font-extrabold text-lg shadow-xl transition-all transform active:scale-95 flex items-center justify-center gap-2 border ${isReadyToSubmit ? 'bg-gradient-to-r from-slate-800 to-black text-white border-slate-800 shadow-slate-900/30' : 'bg-slate-100 text-slate-400 border-slate-200 shadow-none cursor-not-allowed'}`}
                        >
                            <span>提交稽核紀錄</span>
                            {isReadyToSubmit && <i className="fa-solid fa-paper-plane text-sm ml-1"></i>}
                        </button>
                    </div>
                </div>
            );
        };

        const MysteryForm = ({ currentUser, onBack, onSubmit }) => {
            const [partnerName, setPartnerName] = useState('');
            const [mistakes, setMistakes] = useState(0);
            const [mistakeNote, setMistakeNote] = useState(''); 
            const score = Math.max(0, 100 - (mistakes * 5));

            const isReadyToSubmit = partnerName.trim().length > 0;

            const handleCounter = (delta) => { triggerVibration(); setMistakes(prev => Math.max(0, prev + delta)); };

            const submitMystery = () => {
                if (!isReadyToSubmit) return;
                triggerVibration([50,50,50]);
                const itemsPayload = [
                        { id: 'm_score', title: '訓練分數', desc: `${score} 分`, staffResult: score >= 80 ? 'pass' : 'fail' },
                        { id: 'm_count', title: '缺失數', desc: `${mistakes} 個`, staffResult: 'info' }
                ];
                if (mistakeNote.trim()) {
                    itemsPayload.push({ id: 'm_note', title: '缺失說明', desc: mistakeNote.trim(), staffResult: 'info', isNote: true });
                }

                const auditData = {
                    id: `${Date.now()}_mystery_${currentUser.name}`, zoneId: 'MYSTERY', zoneName: '神秘客訓練', timestamp: getNowString(),
                    staffName: `${currentUser.name} & ${partnerName}`, participants: [currentUser.name, partnerName.trim()], 
                    type: 'mystery', score: score, mistakes: mistakes, items: itemsPayload, status: 'pending', note: mistakeNote.trim() 
                };
                onSubmit(auditData);
            };

            return (
                <div className="pb-36 max-w-md mx-auto scale-in pb-safe relative z-10">
                    <div className="sticky top-[60px] bg-white/70 backdrop-blur-xl z-40 border-b border-white/50 shadow-sm transition-all">
                        <div className="p-4 flex items-center gap-4">
                            <button onClick={() => { triggerVibration(); onBack(); }} className="w-10 h-10 flex items-center justify-center rounded-full bg-white text-slate-600 shadow-sm border border-slate-100 active:scale-90 transition">
                                <i className="fa-solid fa-arrow-left text-lg"></i>
                            </button>
                            <h2 className="font-bold text-lg text-slate-800 tracking-wide">神秘客訓練</h2>
                        </div>
                    </div>

                    <div className="p-6 space-y-8">
                        <div className="bg-white/80 backdrop-blur-md p-6 rounded-3xl shadow-[0_2px_15px_rgba(0,0,0,0.03)] border border-white/60">
                            <label className="block text-sm font-bold text-slate-700 mb-3 flex items-center gap-2"><i className="fa-solid fa-user-group text-purple-500"></i> 協作夥伴姓名</label>
                            <input type="text" value={partnerName} onChange={(e) => setPartnerName(e.target.value)} placeholder="請輸入夥伴姓名" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-purple-500 outline-none text-slate-800 font-bold transition-all shadow-inner" style={{ userSelect: 'text', WebkitUserSelect: 'text' }} />
                            <p className="text-[11px] text-purple-600 mt-3 font-bold bg-purple-50 p-2 rounded-lg border border-purple-100 flex items-center gap-2"><i className="fa-solid fa-gift"></i> 此次訓練將為您與夥伴同時累積 10 點</p>
                        </div>

                        <div className="bg-gradient-to-br from-purple-600 to-indigo-700 rounded-[2rem] p-8 text-white text-center shadow-xl shadow-purple-500/30 border border-white/20 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-2xl -mr-10 -mt-10 pointer-events-none"></div>
                            <div className="text-sm font-bold tracking-widest uppercase opacity-80 mb-2">當前得分</div>
                            <div className="text-7xl font-black font-mono tracking-tighter drop-shadow-md">{score}</div>
                            <div className="text-xs mt-3 opacity-70 font-medium bg-black/20 py-1.5 px-4 rounded-full inline-block">起始 100 分 • 每一缺失 -5 分</div>
                        </div>

                        <div className="bg-white/80 backdrop-blur-md p-6 rounded-3xl shadow-[0_2px_15px_rgba(0,0,0,0.03)] border border-white/60">
                            <label className="block text-sm font-bold text-slate-700 mb-6 text-center tracking-wide"><i className="fa-solid fa-clipboard-list text-indigo-500 mr-2"></i>缺失項目計數</label>
                            <div className="flex items-center justify-center gap-6">
                                <button onClick={() => handleCounter(-1)} disabled={mistakes === 0} className="w-16 h-16 rounded-full bg-white border border-slate-200 text-slate-500 text-2xl flex items-center justify-center active:scale-90 transition shadow-sm disabled:opacity-40 disabled:active:scale-100"><i className="fa-solid fa-minus"></i></button>
                                <div className="w-24 text-center">
                                    <span className="text-5xl font-black text-slate-800 tracking-tighter">{mistakes}</span>
                                    <div className="text-xs text-slate-400 mt-1 font-bold uppercase tracking-widest">Mistakes</div>
                                </div>
                                <button onClick={() => handleCounter(1)} className="w-16 h-16 rounded-full bg-gradient-to-br from-red-500 to-rose-500 border border-white text-white text-2xl flex items-center justify-center active:scale-90 transition shadow-lg shadow-red-500/30"><i className="fa-solid fa-plus"></i></button>
                            </div>
                        </div>

                        <div className="bg-white/80 backdrop-blur-md p-6 rounded-3xl shadow-[0_2px_15px_rgba(0,0,0,0.03)] border border-white/60">
                            <label className="block text-sm font-bold text-slate-700 mb-3 flex items-center gap-2"><i className="fa-solid fa-comment-dots text-blue-500"></i>缺失項目說明 (選填)</label>
                            <textarea value={mistakeNote} onChange={(e) => setMistakeNote(e.target.value)} placeholder="請輸入具體缺失內容，例如：未主動介紹優惠..." className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-purple-500 outline-none text-slate-700 h-28 resize-none shadow-inner" style={{ userSelect: 'text', WebkitUserSelect: 'text' }}></textarea>
                        </div>
                    </div>
                    
                    <div className="fixed bottom-0 left-0 right-0 p-4 bg-white/70 backdrop-blur-xl border-t border-white/50 max-w-md mx-auto z-50 pb-safe shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
                        <button disabled={!isReadyToSubmit} onClick={submitMystery} className={`w-full py-4 rounded-3xl font-extrabold text-lg shadow-xl transition-all transform active:scale-95 flex items-center justify-center gap-2 border ${isReadyToSubmit ? 'bg-gradient-to-r from-purple-600 to-indigo-600 text-white border-purple-500 shadow-purple-500/40' : 'bg-slate-100 text-slate-400 border-slate-200 shadow-none cursor-not-allowed'}`}>
                            <span>提交訓練結果</span>{isReadyToSubmit && <i className="fa-solid fa-check-circle ml-1"></i>}
                        </button>
                    </div>
                </div>
            );
        };

        // --- Manager Components ---
        const RedemptionPanel = ({ allUsers, onRedeem, onClose }) => {
            const [selectedUser, setSelectedUser] = useState(null);
            const [amount, setAmount] = useState('');
            const staffList = Object.entries(allUsers).filter(([_, data]) => data.role === 'staff');

            const handleRedeem = () => {
                if (!selectedUser || !amount) return;
                onRedeem(selectedUser, parseInt(amount));
                setAmount('');
                setSelectedUser(null);
            };

            return (
                <div className="fixed inset-0 bg-slate-900/60 z-[100] flex items-end sm:items-center justify-center animate-fade-in backdrop-blur-md">
                    <div className="bg-white/95 backdrop-blur-xl w-full max-w-sm sm:rounded-3xl rounded-t-3xl p-6 shadow-2xl scale-in pb-safe border border-white/50">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-xl font-extrabold text-slate-800 tracking-wide">點數兌換中心</h2>
                            <button onClick={() => { triggerVibration(); onClose(); }} className="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full text-slate-500 active:scale-90 transition"><i className="fa-solid fa-xmark text-lg"></i></button>
                        </div>
                        <div className="space-y-3 mb-6 max-h-[50vh] overflow-y-auto no-scrollbar pb-4">
                            {staffList.map(([name, data]) => (
                                <button key={name} onClick={() => { triggerVibration(); setSelectedUser(name); }} className={`w-full flex justify-between items-center p-4 rounded-2xl border transition-all active:scale-[0.98] ${selectedUser === name ? 'bg-gradient-to-r from-blue-50 to-indigo-50 border-blue-300 ring-2 ring-blue-500 ring-offset-2 shadow-sm' : 'border-slate-100 bg-white hover:bg-slate-50'}`}>
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 font-bold text-sm shadow-inner border border-white">{name[0]}</div>
                                        <span className="font-extrabold text-slate-700">{name}</span>
                                    </div>
                                    <div className="flex flex-col items-end gap-1">
                                        <div className="font-bold text-blue-700 bg-blue-100 px-3 py-1 rounded-xl text-sm tracking-wide">{data.points} P</div>
                                        <div className="text-[10px] text-slate-400 font-bold">榮譽: {data.lifetimePoints !== undefined ? data.lifetimePoints : data.points}</div>
                                    </div>
                                </button>
                            ))}
                        </div>
                        {selectedUser && (
                            <div className="bg-slate-50 p-5 rounded-3xl animate-fade-in border border-slate-200 shadow-inner">
                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">兌換額度 (不扣榮譽分)</label>
                                <div className="flex gap-3">
                                    <input type="number" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="輸入點數" className="flex-1 p-4 rounded-2xl border border-slate-300 outline-none focus:ring-2 focus:ring-blue-500 text-lg font-black text-slate-800 shadow-sm" style={{ userSelect: 'text', WebkitUserSelect: 'text' }} />
                                    <button onClick={handleRedeem} disabled={!amount || amount <= 0 || amount > allUsers[selectedUser].points} className="bg-gradient-to-r from-slate-800 to-black text-white px-6 rounded-2xl font-bold disabled:opacity-40 active:scale-95 transition shadow-lg shadow-black/20">確認兌換</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const AnalyticsDashboard = ({ audits }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const analyticsData = useMemo(() => {
                const reviewedAudits = audits.filter(a => a.status === 'reviewed' && a.type === 'audit');
                const mysteryAudits = audits.filter(a => a.type === 'mystery');
                
                const failCounts = {};
                reviewedAudits.forEach(audit => {
                    audit.items.forEach(item => {
                        const finalResult = item.managerResult !== undefined ? item.managerResult : item.staffResult;
                        if (!item.isNote && finalResult === 'fail') {
                            failCounts[item.title] = (failCounts[item.title] || 0) + 1;
                        }
                    });
                });

                const topFails = Object.entries(failCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);
                const totalScore = mysteryAudits.reduce((sum, a) => sum + (Number(a.score) || 0), 0);
                const avgMysteryScore = mysteryAudits.length > 0 ? Math.round(totalScore / mysteryAudits.length) : 0;

                return { totalReviewed: reviewedAudits.length, topFails: topFails, avgMysteryScore: avgMysteryScore, mysteryCount: mysteryAudits.length };
            }, [audits]);

            useEffect(() => {
                if (chartInstance.current) { chartInstance.current.destroy(); }
                if (chartRef.current && analyticsData.topFails.length > 0) {
                    const ctx = chartRef.current.getContext('2d');
                    let gradient = ctx.createLinearGradient(0, 0, 0, 400);
                    gradient.addColorStop(0, 'rgba(239, 68, 68, 0.9)'); 
                    gradient.addColorStop(1, 'rgba(244, 63, 94, 0.4)'); 

                    chartInstance.current = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: analyticsData.topFails.map(d => d[0].substring(0, 7) + (d[0].length>7?'..':'')),
                            datasets: [{
                                label: '被駁回次數',
                                data: analyticsData.topFails.map(d => d[1]),
                                backgroundColor: gradient,
                                borderRadius: 8,
                                borderSkipped: false,
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false }, tooltip: { callbacks: { title: (ctx) => analyticsData.topFails[ctx[0].dataIndex][0] }, backgroundColor: 'rgba(15, 23, 42, 0.9)', padding: 12, cornerRadius: 8 } },
                            scales: {
                                y: { beginAtZero: true, ticks: { stepSize: 1, color: '#94a3b8', font: {family: 'Inter', weight: 'bold'} }, grid: { color: '#f1f5f9' }, border: {display: false} },
                                x: { ticks: { color: '#64748b', font: {family: 'Inter', weight: '600', size: 10} }, grid: { display: false }, border: {display: false} }
                            }
                        }
                    });
                }
                return () => { if(chartInstance.current) chartInstance.current.destroy(); }
            }, [analyticsData]);

            return (
                <div className="space-y-4 animate-fade-in relative z-10 px-1">
                    <div className="grid grid-cols-2 gap-3">
                        <div className="bg-white/80 backdrop-blur border border-white shadow-sm p-5 rounded-3xl flex flex-col justify-center items-center text-center">
                            <span className="text-slate-400 text-xs font-bold tracking-widest uppercase mb-2">一般稽核複查數</span>
                            <span className="text-4xl font-black text-slate-800 drop-shadow-sm">{analyticsData.totalReviewed}</span>
                        </div>
                        <div className="bg-gradient-to-br from-purple-500 to-indigo-600 p-5 rounded-3xl shadow-lg shadow-purple-500/20 border border-white/20 flex flex-col justify-center items-center text-center text-white relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-16 h-16 bg-white/10 rounded-full blur-xl pointer-events-none"></div>
                            <span className="text-purple-100 text-xs font-bold tracking-widest uppercase mb-1 z-10">神秘客平均分數</span>
                            <div className="flex items-baseline gap-1 z-10">
                                <span className="text-4xl font-black drop-shadow-md">{analyticsData.avgMysteryScore || '-'}</span>
                                {analyticsData.avgMysteryScore > 0 && <span className="text-xs font-bold opacity-80">分</span>}
                            </div>
                            <span className="text-[10px] text-purple-200 mt-2 font-medium bg-black/20 px-2 py-0.5 rounded-full z-10">共 {analyticsData.mysteryCount} 筆訓練</span>
                        </div>
                    </div>

                    <div className="bg-white/80 backdrop-blur border border-white p-5 rounded-3xl shadow-sm">
                        <h3 className="font-extrabold text-slate-800 text-sm mb-5 flex items-center tracking-wide"><div className="w-6 h-6 rounded-full bg-red-100 flex items-center justify-center mr-2"><i className="fa-solid fa-chart-column text-red-500 text-xs"></i></div>常犯缺失 Top 5</h3>
                        {analyticsData.topFails.length > 0 ? (
                            <div className="h-52 w-full"><canvas ref={chartRef}></canvas></div>
                        ) : (
                            <div className="h-40 flex flex-col items-center justify-center text-slate-400 text-sm bg-slate-50/50 rounded-2xl border border-dashed border-slate-200">
                                <i className="fa-solid fa-chart-pie text-3xl mb-2 opacity-50"></i>
                                <p className="font-medium">目前尚無扣分數據</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const EmptyState = ({ tab }) => {
            let icon, title, desc;
            if (tab === 'pending') { icon = 'fa-clipboard-check'; title = '太棒了！任務清空'; desc = '目前的稽核單都已審核完畢\n給自己一個掌聲吧！🎉'; }
            else if (tab === 'history') { icon = 'fa-clock-rotate-left'; title = '尚無歷史紀錄'; desc = '這裡會顯示您審核過的單據'; }
            else { icon = 'fa-inbox'; title = '空空如也'; desc = '目前沒有任何資料'; }

            return (
                <div className="text-center py-20 px-6 animate-fade-in relative z-10">
                    <div className="w-24 h-24 mx-auto bg-white/60 backdrop-blur-md rounded-full shadow-lg border border-white flex items-center justify-center mb-6 relative">
                        <div className="absolute inset-0 bg-blue-400/20 rounded-full animate-ping opacity-50"></div>
                        <i className={`fa-solid ${icon} text-4xl text-blue-500 drop-shadow-sm`}></i>
                    </div>
                    <h3 className="text-xl font-extrabold text-slate-800 mb-2 tracking-wide">{title}</h3>
                    <p className="text-slate-500 text-sm font-medium leading-relaxed whitespace-pre-line">{desc}</p>
                </div>
            );
        };

        const ManagerDashboard = ({ audits, allUsers, onReview, onOpenRedeem, onDelete, isInitialLoading }) => {
            const [tab, setTab] = useState('pending');

            const filteredAudits = useMemo(() => {
                if (tab === 'pending') return audits.filter(a => a.status === 'pending');
                if (tab === 'history') return audits.filter(a => a.status === 'reviewed');
                return [];
            }, [audits, tab]);

            return (
                <div className="p-4 max-w-md mx-auto scale-in pb-32">
                    <div className="flex justify-between items-center mb-6 sticky top-[60px] z-30 pt-2 pb-3 bg-f8fafc/90 backdrop-blur">
                        <div className="flex gap-1.5 bg-slate-200/50 p-1.5 rounded-2xl shadow-inner overflow-x-auto no-scrollbar flex-1 mr-3 border border-slate-200/50">
                            {['pending', 'history', 'analytics', 'leaderboard'].map(t => {
                                const labels = { pending: `待審 (${audits.filter(a=>a.status==='pending').length})`, history: '歷史', analytics: '分析', leaderboard: '排名' };
                                const isActive = tab === t;
                                return (
                                    <button key={t} onClick={() => { triggerVibration(); setTab(t); }} className={`px-4 py-2 text-sm font-extrabold rounded-xl transition-all whitespace-nowrap flex-1 text-center ${isActive ? 'bg-white text-blue-600 shadow-sm border border-slate-100' : 'text-slate-500 hover:text-slate-700'}`}>
                                        {labels[t]}
                                    </button>
                                );
                            })}
                        </div>
                        {tab !== 'leaderboard' && tab !== 'analytics' && (
                            <button onClick={() => { triggerVibration(); onOpenRedeem(); }} className="bg-gradient-to-tr from-amber-400 to-orange-500 text-white w-11 h-11 rounded-2xl flex items-center justify-center shadow-lg shadow-orange-500/30 active:scale-90 transition flex-shrink-0 border border-white/20">
                                <i className="fa-solid fa-gift text-lg"></i>
                            </button>
                        )}
                    </div>

                    {isInitialLoading ? <SkeletonList /> : (
                        <>
                            {tab === 'leaderboard' && <LeaderboardList allUsers={allUsers} />}
                            {tab === 'analytics' && <AnalyticsDashboard audits={audits} />}
                            
                            {(tab === 'pending' || tab === 'history') && filteredAudits.length === 0 ? (
                                <EmptyState tab={tab} />
                            ) : (
                                (tab === 'pending' || tab === 'history') && (
                                    <div className="space-y-4 relative z-10 px-1">
                                        {filteredAudits.map(audit => (
                                            <div key={audit.id} className="bg-white/90 backdrop-blur-md rounded-3xl shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-white/60 overflow-hidden active:scale-[0.98] transition-transform relative group hover:shadow-md">
                                                <div className="p-5">
                                                    <div className="flex justify-between items-start mb-4">
                                                        <div className="flex items-center gap-3.5">
                                                            <span className={`w-12 h-12 rounded-2xl flex items-center justify-center font-black text-lg border shadow-inner ${audit.type === 'mystery' ? 'bg-gradient-to-tr from-purple-50 to-indigo-50 text-indigo-600 border-indigo-100' : 'bg-gradient-to-tr from-blue-50 to-cyan-50 text-blue-600 border-blue-100'}`}>
                                                                {audit.type === 'mystery' ? <i className="fa-solid fa-user-secret"></i> : audit.zoneId}
                                                            </span>
                                                            <div className="flex flex-col justify-center">
                                                                <h3 className="font-extrabold text-slate-800 text-lg leading-tight tracking-wide">{audit.zoneName}</h3>
                                                                <p className="text-xs text-slate-400 mt-1 font-mono font-medium tracking-wide"><i className="fa-regular fa-clock mr-1"></i>{parseAndFormatDate(audit.timestamp)}</p>
                                                            </div>
                                                        </div>
                                                        <div className="flex flex-col items-end gap-2">
                                                            {audit.status === 'reviewed' ? (
                                                                <span className={`text-xs px-3 py-1.5 rounded-xl font-bold shadow-sm border ${audit.penalty > 0 ? 'bg-red-50 text-red-600 border-red-100' : 'bg-emerald-50 text-emerald-600 border-emerald-100'}`}>
                                                                    {audit.penalty > 0 ? `扣 ${audit.penalty} 點` : 'Perfect!'}
                                                                </span>
                                                            ) : (
                                                                <span className="text-[10px] bg-amber-100 text-amber-700 px-3 py-1.5 rounded-xl font-black uppercase tracking-wider animate-pulse border border-amber-200">待複查</span>
                                                            )}
                                                            
                                                            <button onClick={(e) => { e.stopPropagation(); triggerVibration(); onDelete(audit); }} className="w-8 h-8 flex items-center justify-center bg-slate-50 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-all border border-transparent active:scale-90">
                                                                <i className="fa-solid fa-trash-can text-xs"></i>
                                                            </button>
                                                        </div>
                                                    </div>
                                                    
                                                    {audit.type === 'mystery' ? (
                                                        <div className="bg-gradient-to-r from-purple-50 to-indigo-50 rounded-2xl p-3 mb-3 text-xs text-indigo-800 flex justify-between items-center border border-indigo-100 shadow-inner">
                                                            <span className="font-bold tracking-wide"><i className="fa-solid fa-trophy mr-1.5 text-amber-500"></i>得分: {audit.score}</span>
                                                            <span className="font-bold tracking-wide"><i className="fa-solid fa-triangle-exclamation mr-1.5 text-red-400"></i>缺失: {audit.mistakes}</span>
                                                        </div>
                                                    ) : null}

                                                    <div className="flex justify-between items-center pt-3 border-t border-slate-100">
                                                        <p className="text-sm font-bold text-slate-500 truncate max-w-[60%] tracking-wide"><i className="fa-solid fa-circle-user mr-2 text-slate-300"></i>{audit.staffName}</p>
                                                        {audit.status === 'pending' ? (
                                                            <button onClick={() => { triggerVibration(); onReview(audit); }} className="bg-slate-800 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-md shadow-slate-800/20 active:scale-95 transition-all">開始複查</button>
                                                        ) : (
                                                            <button onClick={() => { triggerVibration(); onReview(audit); }} className="text-slate-400 hover:text-blue-500 text-sm font-extrabold flex items-center gap-1 transition-colors">詳情 <i className="fa-solid fa-chevron-right text-xs"></i></button>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )
                            )}
                        </>
                    )}
                </div>
            );
        };

        const ReviewForm = ({ audit, onBack, onSubmitReview }) => {
            const [managerOverrides, setManagerOverrides] = useState({});
            const [managerNote, setManagerNote] = useState('');

            const handleOverride = (itemId, result) => { triggerVibration(); setManagerOverrides(prev => ({ ...prev, [itemId]: result })); };

            const handleBatchApprove = () => {
                triggerVibration([50,50]);
                const newOverrides = {};
                audit.items.forEach(item => { if (!item.isNote) newOverrides[item.id] = 'pass'; });
                setManagerOverrides(newOverrides);
            };

            const calculatePenalty = () => {
                let hasConflict = false;
                audit.items.forEach(item => {
                    if (item.isNote) return; 
                    const staffResult = item.staffResult;
                    const managerResult = managerOverrides[item.id] !== undefined ? managerOverrides[item.id] : (item.managerResult || staffResult);
                    if (staffResult === 'pass' && managerResult === 'fail') hasConflict = true;
                });
                return hasConflict ? 10 : 0;
            };

            const currentPenalty = calculatePenalty();

            const submitReview = () => {
                triggerVibration([50,100,50]);
                const reviewedItems = audit.items.map(item => ({
                    ...item, managerResult: !item.isNote && managerOverrides[item.id] !== undefined ? managerOverrides[item.id] : item.staffResult
                }));
                if (managerNote.trim()) {
                    reviewedItems.push({ id: `mgr_note_${Date.now()}`, title: '檢核人員筆記', desc: managerNote.trim(), category: '備註', staffResult: 'info', isNote: true, isManagerNote: true });
                }
                onSubmitReview({ ...audit, items: reviewedItems, status: 'reviewed', penalty: currentPenalty });
            };

            const isReadOnly = audit.status === 'reviewed';

            return (
                <div className="pb-36 max-w-md mx-auto scale-in pb-safe relative z-10">
                     <div className="sticky top-[60px] bg-white/70 backdrop-blur-xl z-40 border-b border-white/50 p-4 flex items-center justify-between shadow-sm transition-all">
                        <div className="flex items-center gap-3">
